[macro test_4]
{# ── Context variable inspector ── #}

{# Printer connection & state #}
{% if printer %}
NOTIFY --message="[TEST] Printer: {{ printer.state }} | Connected: {{ printer.connected }}"

{# Temperatures #}
NOTIFY --message="[TEST] Nozzle: {{ printer.nozzle_temp }}°C | Bed: {{ printer.bed_temp }}°C"

{# Print progress #}
{% if printer.current_print %}
NOTIFY --message="[TEST] Printing: {{ printer.current_print }} | Progress: {{ printer.progress | round(1) }}% | Layer: {{ printer.layer }}/{{ printer.total_layers }}"
{% else %}
NOTIFY --message="[TEST] No active print"
{% endif %}

{# AMS slots #}
{% if ams %}
{% for unit in ams %}
NOTIFY --message="[TEST] AMS unit {{ loop.index0 }}: {{ unit }}"
{% endfor %}
{% else %}
NOTIFY --message="[TEST] No AMS units detected"
{% endif %}

{# Print queue #}
NOTIFY --message="[TEST] Queue length: {{ queue }}"

{% else %}
NOTIFY --message="[TEST] No printer connected — context is empty"
{% endif %}

{# Done #}
NOTIFY --message="[TEST] ✓ Variable inspection complete"
