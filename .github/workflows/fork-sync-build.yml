name: Fork - Build and push Docker image

# ─────────────────────────────────────────────────────────────────────────────
# Builds and publishes a Docker image to ghcr.io/soopahfly/bambuddy:latest
# whenever the dev branch is updated. A self-hosted Watchtower instance picks
# up the new image automatically.
#
# Upstream sync is handled manually (not automated) to avoid merge conflicts.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - dev
  workflow_dispatch:      # manual trigger in the GitHub Actions UI

concurrency:
  group: fork-sync-build
  cancel-in-progress: false  # never cancel a running build mid-push

env:
  IMAGE: ghcr.io/soopahfly/bambuddy

jobs:

  # ── Build and push Docker image ────────────────────────────────────────────
  # Triggered by any push to dev (or manual dispatch).
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FORK_VERSION_SUFFIX=-soopahfly
          cache-from: type=gha,scope=fork-image-v2
          cache-to: type=gha,scope=fork-image-v2,mode=max
